<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym Log" />
  <title>Gym Log</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --accent: #ff9f0a;
      --accent2: #ff6b35;
      --text: #f5f5f7;
      --text2: #aeaeb2;
      --border: #3a3a3c;
      --danger: #ff453a;
      --success: #32d74b;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(80px + var(--safe-bottom));
    }

    /* ── NAV BAR ── */
    .navbar {
      position: sticky; top: 0;
      background: rgba(15,15,15,0.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      padding: calc(var(--safe-top) + 12px) 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .navbar h1 {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── TAB BAR ── */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15,15,15,0.92);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 1px solid var(--border);
      display: flex; padding-bottom: var(--safe-bottom);
      z-index: 100;
    }
    .tab-btn {
      flex: 1; background: none; border: none; color: var(--text2);
      padding: 10px 0 8px; font-size: 10px; font-weight: 500;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; transition: color 0.2s;
    }
    .tab-btn .icon { font-size: 22px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    /* ── PAGES ── */
    .page { display: none; padding: 20px; }
    .page.active { display: block; }

    /* ── CARD ── */
    .card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px;
    }
    .card-header {
      padding: 14px 16px 10px; font-size: 13px; font-weight: 600;
      color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ── FORM ROWS ── */
    .form-group { padding: 0 16px 4px; }
    .form-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .form-row:last-child { border-bottom: none; }
    .form-row label { font-size: 16px; color: var(--text); flex: 0 0 90px; }
    .form-row input, .form-row select {
      flex: 1; background: none; border: none; color: var(--text);
      font-size: 16px; font-family: inherit; text-align: right;
      outline: none; -webkit-appearance: none; appearance: none;
    }
    .form-row select option { background: #1c1c1e; }
    .form-row select:disabled { color: var(--text2); opacity: 0.5; }
    .form-row input[type="number"]::-webkit-inner-spin-button { display: none; }

    /* chevron for selects */
    .select-wrap { flex: 1; position: relative; display: flex; align-items: center; }
    .select-wrap select { flex: 1; padding-right: 20px; }
    .select-wrap::after {
      content: '›';
      position: absolute; right: 0;
      color: var(--text2); font-size: 18px;
      pointer-events: none; transform: rotate(90deg);
    }

    /* ── MUSCLE GROUP PILLS ── */
    .muscle-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 12px 16px 0;
    }
    .muscle-pill {
      padding: 7px 14px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .muscle-pill.selected {
      border-color: var(--accent);
      background: rgba(255,159,10,0.15);
      color: var(--accent);
    }

    /* exercise select row shown after group chosen */
    .ex-select-row {
      margin: 10px 16px 14px;
      background: var(--surface2);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .ex-select-row.visible { display: flex; }
    .ex-select-row label { font-size: 15px; color: var(--text2); flex: 0 0 auto; }
    .ex-select-row select {
      flex: 1; background: none; border: none; color: var(--text);
      font-size: 16px; font-family: inherit; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .ex-select-row select option { background: #1c1c1e; }

    /* ── STEPPER ── */
    .stepper { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .stepper button {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--surface2); color: var(--accent);
      font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .stepper button:active { background: var(--border); }
    .stepper .val { min-width: 52px; text-align: center; font-size: 17px; font-weight: 600; color: var(--text); }

    /* ── BUTTON ── */
    .btn-primary {
      width: 100%; margin: 16px 0 4px; padding: 16px; border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-size: 17px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-danger {
      background: none; border: 1px solid var(--danger); color: var(--danger);
      border-radius: 8px; padding: 6px 12px; font-size: 13px; font-family: inherit; cursor: pointer;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(90px + var(--safe-bottom));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--success); color: #000;
      padding: 12px 24px; border-radius: 100px;
      font-size: 15px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; z-index: 200; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── HISTORY ── */
    .log-date-group { margin-bottom: 24px; }
    .log-date-label { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .log-item {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 14px 16px;
      margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .log-item-info { flex: 1; min-width: 0; }
    .log-item-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .log-item-group { font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
    .log-item-meta { font-size: 14px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-item-badge { background: var(--surface2); border-radius: 8px; padding: 6px 10px; text-align: center; min-width: 56px; }
    .log-item-badge .badge-val { font-size: 18px; font-weight: 700; color: var(--accent); display: block; }
    .log-item-badge .badge-unit { font-size: 10px; color: var(--text2); text-transform: uppercase; }

    .empty-state { text-align: center; color: var(--text2); padding: 60px 20px; }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 16px; }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
    .stat-val {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

    .exercise-stat { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .exercise-stat:last-child { border-bottom: none; }
    .ex-name { font-size: 15px; }
    .ex-group-tag { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; }
    .ex-count { font-size: 14px; color: var(--accent); font-weight: 600; }

    /* ── SETTINGS ── */
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 16px; }
    .settings-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

    /* reps sub-rows */
    #reps-container .rep-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 10px; }
    #reps-container .rep-row:last-child { border-bottom: none; }
    #reps-container .rep-label { font-size: 14px; color: var(--text2); flex: 0 0 60px; }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <h1>💪 Gym Log</h1>
  <span id="today-display" style="font-size:13px;color:var(--text2)"></span>
</nav>

<!-- ════════════════ LOG PAGE ════════════════ -->
<div id="page-log" class="page active">

  <div class="card">
    <div class="card-header">New Entry</div>
    <div class="form-group">
      <div class="form-row">
        <label>Date</label>
        <input type="date" id="entry-date" />
      </div>
    </div>

    <!-- STEP 1: Muscle Group pills -->
    <div class="card-header" style="padding-bottom:4px">1. Muscle Group</div>
    <div class="muscle-pills" id="muscle-pills"></div>

    <!-- STEP 2: Exercise select (shown after group chosen) -->
    <div class="card-header" style="padding-top:14px;padding-bottom:4px" id="ex-step-label" style="display:none">2. Exercise</div>
    <div class="ex-select-row" id="ex-select-row">
      <label>Exercise</label>
      <select id="entry-exercise"></select>
      <span style="color:var(--text2);font-size:18px;pointer-events:none">›</span>
    </div>

    <!-- Weight / Sets / Reps -->
    <div class="form-group" id="entry-details" style="opacity:0.4;pointer-events:none;transition:opacity 0.25s">
      <div class="card-header" style="padding:14px 0 4px">3. Weight &amp; Sets</div>

      <div class="form-row">
        <label>Weight</label>
        <div class="stepper">
          <button onclick="stepWeight(-2.5)">−</button>
          <span class="val" id="weight-val">60</span>
          <button onclick="stepWeight(2.5)">+</button>
        </div>
        <span style="color:var(--text2);font-size:14px;margin-left:4px" id="weight-unit-label">kg</span>
      </div>

      <div class="form-row">
        <label>Sets</label>
        <div class="stepper">
          <button onclick="stepSets(-1)">−</button>
          <span class="val" id="sets-val">3</span>
          <button onclick="stepSets(1)">+</button>
        </div>
      </div>
    </div>

    <!-- Reps per set -->
    <div id="reps-section" style="opacity:0.4;pointer-events:none;transition:opacity 0.25s">
      <div style="padding: 0 16px">
        <div class="card-header" style="padding:10px 0 6px">Reps per set</div>
        <div id="reps-container"></div>
      </div>
    </div>

    <div style="padding: 0 16px 16px">
      <textarea id="entry-notes" placeholder="Notes (optional)" rows="2"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);
               border-radius:10px;color:var(--text);font-size:15px;font-family:inherit;
               padding:10px;outline:none;resize:none;margin-top:8px"></textarea>
      <button class="btn-primary" id="save-btn" onclick="saveEntry()" disabled>Save Workout</button>
    </div>
  </div>

</div>

<!-- ════════════════ HISTORY PAGE ════════════════ -->
<div id="page-history" class="page">
  <div id="history-list"></div>
</div>

<!-- ════════════════ STATS PAGE ════════════════ -->
<div id="page-stats" class="page">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="card">
    <div class="card-header">Top Exercises</div>
    <div id="top-exercises-list"></div>
  </div>
</div>

<!-- ════════════════ SETTINGS PAGE ════════════════ -->
<div id="page-settings" class="page">
  <div class="card">
    <div class="card-header">Preferences</div>
    <div class="settings-row">
      <div><div class="settings-label">Weight Unit</div><div class="settings-sub">kg or lbs</div></div>
      <div style="display:flex;gap:8px">
        <button id="unit-kg" onclick="setUnit('kg')" style="padding:6px 14px;border-radius:8px;border:none;font-family:inherit;font-size:14px;cursor:pointer">kg</button>
        <button id="unit-lbs" onclick="setUnit('lbs')" style="padding:6px 14px;border-radius:8px;border:none;font-family:inherit;font-size:14px;cursor:pointer">lbs</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Custom Exercises</div>
    <div id="custom-ex-list"></div>
    <div style="padding:12px 16px">
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <select id="custom-ex-group" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;font-family:inherit;padding:10px;outline:none;-webkit-appearance:none;appearance:none">
        </select>
        <span style="color:var(--text2);font-size:18px;display:flex;align-items:center">›</span>
      </div>
      <div style="display:flex;gap:8px">
        <input id="new-ex-input" placeholder="Exercise name…" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;font-family:inherit;padding:10px;outline:none" />
        <button onclick="addCustomExercise()" style="padding:10px 16px;border-radius:8px;border:none;background:var(--accent);color:#000;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit">Add</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Data</div>
    <div class="settings-row">
      <div><div class="settings-label">Export Data</div><div class="settings-sub">Download as JSON</div></div>
      <button onclick="exportData()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--surface2);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit">Export</button>
    </div>
    <div class="settings-row">
      <div><div class="settings-label" style="color:var(--danger)">Clear All Data</div><div class="settings-sub">Cannot be undone</div></div>
      <button class="btn-danger" onclick="clearAllData()">Clear</button>
    </div>
  </div>

  <p style="text-align:center;color:var(--text2);font-size:12px;padding:12px">Data stored on this device only 🔒</p>
</div>

<!-- TAB BAR -->
<nav class="tabbar">
  <button class="tab-btn active" onclick="showPage('log',this)"><span class="icon">➕</span>Log</button>
  <button class="tab-btn" onclick="showPage('history',this)"><span class="icon">📋</span>History</button>
  <button class="tab-btn" onclick="showPage('stats',this)"><span class="icon">📊</span>Stats</button>
  <button class="tab-btn" onclick="showPage('settings',this)"><span class="icon">⚙️</span>Settings</button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  EXERCISE DATA
// ═══════════════════════════════════════════════
const EXERCISE_DATA = {
  'Chest':      ['Bench Press', 'Chest Press', 'Pectoral Fly', 'Abdominal'],
  'Arms':       ['Barbell Curls', 'Tricep Extension', 'Hammer Curls'],
  'Back':       ['Row', 'Dumbbell Row', 'Lat Pull Down'],
  'Shoulders':  ['Arnie Press', 'High Pulls', 'Converging Shoulder Press'],
  'Legs':       ['Linear Leg Press', 'Leg Extension (6 seat, 2 leg)', 'Calf Press', 'Seated Leg Curl (Seat 6, Leg 2, Feet 2)', 'Squats']
};
const MUSCLE_GROUPS = Object.keys(EXERCISE_DATA);

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let entries   = JSON.parse(localStorage.getItem('gymlog_entries')  || '[]');
let settings  = JSON.parse(localStorage.getItem('gymlog_settings') || '{"unit":"kg","customEx":{}}');
if (!settings.customEx || Array.isArray(settings.customEx)) settings.customEx = {};

let currentWeight    = 60;
let currentSets      = 3;
let currentReps      = [10, 10, 10];
let selectedGroup    = null;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
const today = new Date().toISOString().slice(0,10);
document.getElementById('entry-date').value = today;
document.getElementById('today-display').textContent = formatDate(today);

buildMusclePills();
renderReps();
applyUnit();
populateCustomGroupSelect();

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function allExercisesForGroup(group) {
  const base = EXERCISE_DATA[group] || [];
  const custom = (settings.customEx[group] || []);
  return [...base, ...custom];
}

// ═══════════════════════════════════════════════
//  MUSCLE GROUP PILLS
// ═══════════════════════════════════════════════
function buildMusclePills() {
  const container = document.getElementById('muscle-pills');
  container.innerHTML = '';
  MUSCLE_GROUPS.forEach(group => {
    const btn = document.createElement('button');
    btn.className = 'muscle-pill';
    btn.textContent = group;
    btn.onclick = () => selectMuscleGroup(group, btn);
    container.appendChild(btn);
  });
}

function selectMuscleGroup(group, btn) {
  // toggle if already selected
  if (selectedGroup === group) {
    selectedGroup = null;
    btn.classList.remove('selected');
    hideExerciseSelect();
    lockDetails();
    return;
  }
  selectedGroup = group;
  document.querySelectorAll('.muscle-pill').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  showExerciseSelect(group);
}

function showExerciseSelect(group) {
  const row = document.getElementById('ex-select-row');
  const sel = document.getElementById('entry-exercise');
  const exercises = allExercisesForGroup(group);

  sel.innerHTML = '';
  if (exercises.length === 0) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = 'No exercises — add one in Settings';
    sel.appendChild(opt);
    lockDetails();
  } else {
    exercises.forEach(ex => {
      const opt = document.createElement('option');
      opt.value = ex; opt.textContent = ex;
      sel.appendChild(opt);
    });
    unlockDetails();
  }
  row.classList.add('visible');
  document.getElementById('ex-step-label').style.display = 'block';
}

function hideExerciseSelect() {
  document.getElementById('ex-select-row').classList.remove('visible');
  document.getElementById('ex-step-label').style.display = 'none';
  document.getElementById('save-btn').disabled = true;
}

function unlockDetails() {
  document.getElementById('entry-details').style.opacity = '1';
  document.getElementById('entry-details').style.pointerEvents = 'auto';
  document.getElementById('reps-section').style.opacity = '1';
  document.getElementById('reps-section').style.pointerEvents = 'auto';
  document.getElementById('save-btn').disabled = false;
}

function lockDetails() {
  document.getElementById('entry-details').style.opacity = '0.4';
  document.getElementById('entry-details').style.pointerEvents = 'none';
  document.getElementById('reps-section').style.opacity = '0.4';
  document.getElementById('reps-section').style.pointerEvents = 'none';
  document.getElementById('save-btn').disabled = true;
}

// ═══════════════════════════════════════════════
//  STEPPERS
// ═══════════════════════════════════════════════
function stepWeight(delta) {
  currentWeight = Math.max(0, Math.round((currentWeight + delta) * 10) / 10);
  document.getElementById('weight-val').textContent = currentWeight;
}
function stepSets(delta) {
  currentSets = Math.max(1, Math.min(10, currentSets + delta));
  document.getElementById('sets-val').textContent = currentSets;
  while (currentReps.length < currentSets) currentReps.push(currentReps[currentReps.length-1] || 10);
  currentReps = currentReps.slice(0, currentSets);
  renderReps();
}
function stepRep(i, delta) {
  currentReps[i] = Math.max(1, (currentReps[i] || 10) + delta);
  renderReps();
}
function renderReps() {
  const c = document.getElementById('reps-container');
  c.innerHTML = '';
  for (let i = 0; i < currentSets; i++) {
    const row = document.createElement('div');
    row.className = 'rep-row';
    row.innerHTML = `
      <span class="rep-label">Set ${i+1}</span>
      <div class="stepper" style="flex:1;justify-content:flex-end">
        <button onclick="stepRep(${i},-1)">−</button>
        <span class="val" id="rep-val-${i}">${currentReps[i] || 10}</span>
        <button onclick="stepRep(${i},1)">+</button>
      </div>
      <span style="color:var(--text2);font-size:13px;margin-left:4px">reps</span>
    `;
    c.appendChild(row);
  }
}

// ═══════════════════════════════════════════════
//  SAVE ENTRY
// ═══════════════════════════════════════════════
function saveEntry() {
  if (!selectedGroup) { showToast('⚠️ Pick a muscle group first'); return; }
  const exercise = document.getElementById('entry-exercise').value;
  if (!exercise) { showToast('⚠️ Pick an exercise'); return; }

  const entry = {
    id: Date.now(),
    date: document.getElementById('entry-date').value,
    group: selectedGroup,
    exercise,
    weight: currentWeight,
    unit: settings.unit,
    sets: currentSets,
    reps: [...currentReps],
    notes: document.getElementById('entry-notes').value.trim()
  };
  entries.unshift(entry);
  localStorage.setItem('gymlog_entries', JSON.stringify(entries));
  showToast('✅ Saved!');
  document.getElementById('entry-notes').value = '';
}

// ═══════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🏋️</div><p>No workouts yet.<br>Log your first one!</p></div>`;
    return;
  }
  const grouped = {};
  entries.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });
  list.innerHTML = '';
  Object.keys(grouped).sort((a,b) => b.localeCompare(a)).forEach(date => {
    const grp = document.createElement('div');
    grp.className = 'log-date-group';
    grp.innerHTML = `<div class="log-date-label">${formatDate(date)}</div>`;
    grouped[date].forEach(e => {
      const repsStr = e.reps ? e.reps.join(' / ') : '-';
      const item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML = `
        <div class="log-item-info">
          <div class="log-item-group">${e.group || ''}</div>
          <div class="log-item-name">${e.exercise}</div>
          <div class="log-item-meta">${e.sets} sets · ${repsStr} reps${e.notes ? ' · ' + e.notes : ''}</div>
        </div>
        <div class="log-item-badge">
          <span class="badge-val">${e.weight}</span>
          <span class="badge-unit">${e.unit || settings.unit}</span>
        </div>
        <button onclick="deleteEntry(${e.id})" style="background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px 0 4px 4px">🗑</button>
      `;
      grp.appendChild(item);
    });
    list.appendChild(grp);
  });
}

function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(e => e.id !== id);
  localStorage.setItem('gymlog_entries', JSON.stringify(entries));
  renderHistory();
  showToast('🗑 Deleted');
}

// ═══════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════
function renderStats() {
  const grid = document.getElementById('stats-grid');
  const totalSets   = entries.reduce((s,e) => s + (e.sets||0), 0);
  const workoutDays = new Set(entries.map(e => e.date)).size;
  const maxWeight   = entries.length ? Math.max(...entries.map(e => e.weight)) : 0;
  const thisWeek = (() => {
    const d = new Date(); d.setHours(0,0,0,0);
    const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay()+6)%7));
    return new Set(entries.filter(e => new Date(e.date+'T12:00') >= mon).map(e => e.date)).size;
  })();
  grid.innerHTML = `
    <div class="stat-card"><div class="stat-val">${entries.length}</div><div class="stat-label">Total Entries</div></div>
    <div class="stat-card"><div class="stat-val">${workoutDays}</div><div class="stat-label">Workout Days</div></div>
    <div class="stat-card"><div class="stat-val">${totalSets}</div><div class="stat-label">Total Sets</div></div>
    <div class="stat-card"><div class="stat-val">${thisWeek}</div><div class="stat-label">This Week</div></div>
  `;
  const exCount = {};
  entries.forEach(e => {
    const key = e.exercise;
    if (!exCount[key]) exCount[key] = { count: 0, group: e.group || '' };
    exCount[key].count++;
  });
  const sorted = Object.entries(exCount).sort((a,b) => b[1].count - a[1].count).slice(0,8);
  const exList = document.getElementById('top-exercises-list');
  if (!sorted.length) { exList.innerHTML = '<div style="padding:16px;color:var(--text2);text-align:center">No data yet</div>'; return; }
  exList.innerHTML = sorted.map(([name, {count, group}]) => `
    <div class="exercise-stat">
      <div><div class="ex-name">${name}</div><div class="ex-group-tag">${group}</div></div>
      <span class="ex-count">${count}×</span>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════
function setUnit(u) {
  settings.unit = u; saveSettings(); applyUnit();
}
function applyUnit() {
  const isKg = settings.unit === 'kg';
  const kgBtn  = document.getElementById('unit-kg');
  const lbsBtn = document.getElementById('unit-lbs');
  kgBtn.style.background  = isKg  ? 'var(--accent)' : 'var(--surface2)';
  kgBtn.style.color       = isKg  ? '#000' : 'var(--text)';
  kgBtn.style.fontWeight  = isKg  ? '700' : '400';
  lbsBtn.style.background = !isKg ? 'var(--accent)' : 'var(--surface2)';
  lbsBtn.style.color      = !isKg ? '#000' : 'var(--text)';
  lbsBtn.style.fontWeight = !isKg ? '700' : '400';
  document.getElementById('weight-unit-label').textContent = settings.unit;
}

function populateCustomGroupSelect() {
  const sel = document.getElementById('custom-ex-group');
  sel.innerHTML = '';
  MUSCLE_GROUPS.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    sel.appendChild(opt);
  });
}

function addCustomExercise() {
  const inp   = document.getElementById('new-ex-input');
  const group = document.getElementById('custom-ex-group').value;
  const val   = inp.value.trim();
  if (!val) return;
  if (!settings.customEx[group]) settings.customEx[group] = [];
  if (settings.customEx[group].includes(val)) { showToast('Already exists!'); return; }
  settings.customEx[group].push(val);
  saveSettings();
  inp.value = '';
  renderCustomExList();
  showToast('✅ Exercise added to ' + group);
}

function removeCustomEx(group, idx) {
  settings.customEx[group].splice(idx, 1);
  saveSettings();
  renderCustomExList();
  // if current group is open, refresh exercise dropdown
  if (selectedGroup === group) showExerciseSelect(group);
}

function renderCustomExList() {
  const c = document.getElementById('custom-ex-list');
  const allCustom = Object.entries(settings.customEx).filter(([,arr]) => arr.length > 0);
  if (!allCustom.length) {
    c.innerHTML = '<div style="padding:12px 16px;color:var(--text2);font-size:14px">No custom exercises yet</div>';
    return;
  }
  c.innerHTML = allCustom.map(([group, exArr]) =>
    exArr.map((ex, i) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:15px">${ex}</div>
          <div style="font-size:12px;color:var(--accent);font-weight:600;text-transform:uppercase">${group}</div>
        </div>
        <button onclick="removeCustomEx('${group}',${i})" style="background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer">✕</button>
      </div>
    `).join('')
  ).join('');
}

function saveSettings() { localStorage.setItem('gymlog_settings', JSON.stringify(settings)); }

function exportData() {
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gymlog-' + today + '.json';
  a.click();
}

function clearAllData() {
  if (!confirm('Delete ALL workout data? This cannot be undone.')) return;
  entries = [];
  localStorage.removeItem('gymlog_entries');
  showToast('Data cleared');
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'stats')   renderStats();
  if (name === 'settings') { renderCustomExList(); populateCustomGroupSelect(); }
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2300);
}
</script>
</body>
</html>
